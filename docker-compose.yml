services:
  # === SCENARIO 1: Privileged container ===
  # Full device access, all capabilities, no seccomp/apparmor
  privileged:
    build: containers/vulnerable
    container_name: escape-privileged
    privileged: true
    stdin_open: true
    tty: true

  # === SCENARIO 2: Docker socket exposed ===
  # Host Docker socket mounted — classic misconfiguration
  docker-socket:
    build: containers/vulnerable
    container_name: escape-docker-socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    stdin_open: true
    tty: true

  # === SCENARIO 3: Dangerous capabilities (SYS_ADMIN) ===
  # CAP_SYS_ADMIN + device access — realistic misconfiguration chain
  capabilities:
    build: containers/vulnerable
    container_name: escape-capabilities
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    device_cgroup_rules:
      - 'b *:* rmw'
    stdin_open: true
    tty: true

  # === SCENARIO 4: Sensitive host mount ===
  # Host root filesystem mounted inside the container
  host-mount:
    build: containers/vulnerable
    container_name: escape-host-mount
    volumes:
      - /:/host:rw
    stdin_open: true
    tty: true

  # === SCENARIO 5: PID namespace sharing ===
  # Container can see and interact with host processes
  pid-namespace:
    build: containers/vulnerable
    container_name: escape-pid-namespace
    pid: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    stdin_open: true
    tty: true

  # === SCENARIO 6: Hardened container (no known vulns) ===
  # Same image as vulnerable but hardened via runtime config
  hardened:
    build: containers/vulnerable
    container_name: escape-hardened
    user: "1001:1001"
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:exec,nosuid,size=64m,uid=1001,gid=1001
      - /home/researcher/.claude:size=32m,uid=1001,gid=1001
      - /home/researcher/.npm:size=32m,uid=1001,gid=1001
      - /home/researcher/.cache:exec,size=64m,uid=1001,gid=1001
      - /home/researcher/workspace:size=32m,uid=1001,gid=1001
      - /root:size=1m
    stdin_open: true
    tty: true
