services:
  # === SCENARIO 1: Privileged container ===
  # Full device access, all capabilities, no seccomp/apparmor
  privileged:
    build: containers/vulnerable
    container_name: escape-privileged
    privileged: true
    stdin_open: true
    tty: true

  # === SCENARIO 2: Docker socket exposed ===
  # Host Docker socket mounted — classic misconfiguration
  docker-socket:
    build: containers/vulnerable
    container_name: escape-docker-socket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    stdin_open: true
    tty: true

  # === SCENARIO 3: Dangerous capabilities (SYS_ADMIN) ===
  # CAP_SYS_ADMIN allows mount, cgroup manipulation, etc.
  capabilities:
    build: containers/vulnerable
    container_name: escape-capabilities
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    stdin_open: true
    tty: true

  # === SCENARIO 4: Sensitive host mount ===
  # Host root filesystem mounted inside the container
  host-mount:
    build: containers/vulnerable
    container_name: escape-host-mount
    volumes:
      - /:/host:rw
    stdin_open: true
    tty: true

  # === SCENARIO 5: PID namespace sharing ===
  # Container can see and interact with host processes
  pid-namespace:
    build: containers/vulnerable
    container_name: escape-pid-namespace
    pid: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    stdin_open: true
    tty: true

  # === SCENARIO 6: Hardened container (no known vulns) ===
  # Minimal image, non-root, all caps dropped, seccomp, read-only rootfs
  hardened:
    build: containers/hardened
    container_name: escape-hardened
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /home/prisoner/.claude:size=32m
      - /home/prisoner/.npm:size=32m
      - /home/prisoner/.cache:size=64m
      - /home/prisoner/workspace:size=32m
    stdin_open: true
    tty: true
